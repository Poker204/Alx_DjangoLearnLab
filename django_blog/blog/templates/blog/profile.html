<h2>Welcome, {{ user.username }}</h2>
<p>Email: {{ user.email }}</p>
<form method="POST">
    {% csrf_token %}
    <label>Update Email:</label>
    <input type="email" name="email" value="{{ user.email }}">
    <button type="submit">Save Changes</button>
</form>
<a href="{% url 'logout' %}">Logout</a>
